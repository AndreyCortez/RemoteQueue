version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: vps_user
      POSTGRES_PASSWORD: vps_password
      POSTGRES_DB: remote_queue_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vps_user -d remote_queue_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://vps_user:vps_password@db:5432/remote_queue_db
      - REDIS_URL=redis://redis:6379/
      - ENVIRONMENT=development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.web
    ports:
      - "3000:80"
    depends_on:
      - backend

  playwright:
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    working_dir: /e2e
    volumes:
      - ./e2e:/e2e
    depends_on:
      - frontend
    environment:
      - CI=true
    command: npx playwright test

volumes:
  postgres_data:
