services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    image: rq_backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - TENANT_SECRET_KEY=${TENANT_SECRET_KEY}
      - ENVIRONMENT=production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: rq_frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile.web
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.remote-queue.rule=Host(`queue.whale-sss.cloud`)"
      - "traefik.http.routers.remote-queue.entrypoints=websecure"
      - "traefik.http.routers.remote-queue.tls.certresolver=myresolver"
      - "traefik.http.services.remote-queue.loadbalancer.server.port=80"
    networks:
      - proxy
      - default
    restart: unless-stopped

networks:
  proxy:
    external: true

volumes:
  postgres_data:
  redis_data:
